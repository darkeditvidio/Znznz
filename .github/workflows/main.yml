name: RDP ULTIMATE (مُصلح بالكامل)

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-2022
    timeout-minutes: 360  # 6 ساعات

    steps:
      # =========================================================
      # 1. تفعيل RDP وإعداد الجدار الناري
      # =========================================================
      - name: تفعيل RDP
        run: |
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service TermService -Force

      # =========================================================
      # 2. إنشاء مستخدم مدير بكلمة مرور عشوائية
      # =========================================================
      - name: إنشاء مستخدم RDP
        run: |
          $password = "P@ss" + (Get-Random -Maximum 99999) + "!"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "Admin" -Password $securePass -AccountNeverExpires -PasswordNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "Admin"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "Admin"
          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

      # =========================================================
      # 3. تثبيت Tailscale بطريقة مضمونة 100%
      # =========================================================
      - name: تثبيت Tailscale
        run: |
          # تحميل المثبت
          curl -L -o tailscale.msi https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi
          if (-not (Test-Path tailscale.msi)) {
            Write-Error "فشل تحميل Tailscale"
            exit 1
          }
          
          # التثبيت بصمت مع الانتظار حتى الانتهاء
          Start-Process msiexec.exe -ArgumentList "/i `"$PWD\tailscale.msi`" /quiet /norestart" -Wait
          
          # انتظار إضافي لتأكيد التثبيت
          Start-Sleep -Seconds 5
          
          # حذف المثبت
          Remove-Item tailscale.msi -Force -ErrorAction SilentlyContinue
          
          # التحقق من وجود الملف
          $tsPath = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (Test-Path $tsPath) {
            Write-Host "✅ تم تثبيت Tailscale بنجاح"
          } else {
            Write-Error "❌ فشل التثبيت - الملف غير موجود"
            exit 1
          }

      # =========================================================
      # 4. الاتصال بـ Tailscale (مع إيجاد المسار تلقائياً)
      # =========================================================
      - name: الاتصال بـ Tailscale
        run: |
          # البحث عن الملف في المسارين المحتملين
          $tsPath = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (-not (Test-Path $tsPath)) {
            $tsPath = "$env:ProgramFiles (x86)\Tailscale\tailscale.exe"
          }
          if (-not (Test-Path $tsPath)) {
            Write-Error "لم يتم العثور على tailscale.exe"
            exit 1
          }
          
          Write-Host "✅ تم العثور على Tailscale في: $tsPath"
          
          # الاتصال باستخدام المفتاح السري
          & $tsPath up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-rdp
          
          # الحصول على عنوان IP
          $ip = & $tsPath ip -4
          if (-not $ip) {
            Write-Error "لم يتم الحصول على IP"
            exit 1
          }
          echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV

      # =========================================================
      # 5. عرض بيانات الدخول والبقاء شغالاً
      # =========================================================
      - name: عرض بيانات الدخول
        run: |
          Write-Host "====================================================="
          Write-Host "✅ RDP شغال الآن (لمدة 6 ساعات)"
          Write-Host "العنوان: $env:TAILSCALE_IP"
          Write-Host "المستخدم: Admin"
          Write-Host "كلمة المرور: $env:RDP_PASSWORD"
          Write-Host "====================================================="
          Write-Host "⚠️  ينتهي بعد 6 ساعات (حدود GitHub)"
          Write-Host "للحصول على RDP دائم، استخدم السكربت المخصص للـ VPS"
          Write-Host "====================================================="
          
          # البقاء شغالاً حتى إلغاء التنفيذ يدوياً
          while ($true) {
            Write-Host "[$(Get-Date)] RDP نشط..."
            Start-Sleep -Seconds 300
          }
